# @package _global_
diffusion:
  ce_lambda: 2
  transition: "absorbing_masknoedge"
  extra_features: true
  diffusion_steps: 500
  diffusion_steps_eval: 100
  edge_conditional_set: "val"

neuralnet:
  dropout: 0.2
  n_layers: 9
  hidden_dims:
    de: 64
    dx: 256
    dy: 64
    n_head: 8
    dim_ffE: 128
    dim_ffX: 256
    dim_ffy: 128
  hidden_mlp_dims:
    E: 128
    X: 256
    y: 128
  p_to_r_init: 1
  architecture: with_y_atommap_number_pos_enc
  alignment_type: correct
  extra_features: true
  pos_encoding_type: laplacian_pos_enc
  p_to_r_skip_connection: true

test:
  testfile: 0
  batch_size: 16
  elbo_samples: 32
  n_conditions: 8
  wandb_run_name: rxn_marginal_reactant_and_sn_dummy0_ce_clfgTrue
  plot_rxn_chains: false
  plot_dummy_nodes: false
  wandb_run_config: 2609_marginal_reactant_and_sn_dummy0_ce_clfgTrue_config.pickle
  n_samples_per_condition: 100
  rep_samples_per_condition: 1

train:
  seed: 2
  epochs: 1000
  batch_size: 16
  batch_by_size: true
  batchsize_bins:
    val:
      - 16
    test:
      - 16
    train:
      - 8
      - 8
      - 8
      - 8
  log_to_wandb: true
  weight_decay: 0.001
  chains_to_save: 4
  samples_to_generate: 4
  log_grad: false
  with_mask: false
  grad_every_step: 100

dataset:
  datadir: data/uspto-50k-block-15-severilocal
  datadist_dir: data/uspto-50k-block-15-severilocal
  num_workers: 0
  batchsize_bins:
    val:
      - 16
    test:
      - 16
    train:
      - 8
      - 8
      - 8
      - 8
  size_bins:
    val:
      - 250
    test:
      - 250
    train:
      - 64
      - 83
      - 102
      - 140

general:
  name: rxn_absorbing_masknoedge_dummy15_loss_ce_laplacian_pos_encnum_gpus_1_fancybatching_16_diffusionsteps500_num_ev_20_p_to_r_skipinput_alignment_correct_wd0.001_drop0.2-seed2
  wandb:
    mode: offline
